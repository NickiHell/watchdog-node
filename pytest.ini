[pytest]
# Конфигурация pytest для всего проекта
testpaths = ros2_ws/src
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=ros2_ws/src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    hardware: Tests requiring hardware

