# Конфигурация модуля детекции объектов с помощью YOLO

object_detection:
  # Параметры YOLO модели
  yolo:
    model_size: "n"  # Размер модели: n (nano), s (small), m (medium), l (large), x (xlarge)
    model_path: ""  # Путь к кастомной модели (пусто = использовать предобученную)
    confidence_threshold: 0.25  # Порог уверенности (0.0-1.0)
    iou_threshold: 0.45  # Порог IoU для NMS (0.0-1.0)
    device: ""  # Устройство: "" (авто), "cpu", "cuda", "0", "1", ...
    classes: [0]  # Список ID классов для детекции (0 = person, оптимизировано для снижения энергопотребления, было: [])
    target_classes: ["person", "car"]  # Классы объектов для отслеживания (названия)

  # Камера
  camera:
    topic: "/camera/image_raw"  # Топик изображений камеры

  # Обработка
  processing:
    frame_skip: 20  # Обрабатывать каждый N-й кадр (оптимизировано для снижения энергопотребления, было: 5)

  # Отслеживание объектов
  tracking:
    enabled: true  # Включить отслеживание объектов
    tracker_type: "CSRT"  # Тип трекера: CSRT, KCF, MOSSE
    target_class: "person"  # Класс объекта для отслеживания
