# Конфигурация лидара (RPLidar A2)

lidar:
  # Тип лидара: rplidar (рекомендуется) или generic (для экспериментов)
  type: "rplidar"

  # Параметры подключения
  port: "/dev/ttyUSB0"  # Последовательный порт
  baudrate: 115200  # Скорость передачи

  # Для RPLidar A1/A2: 115200
  # Для RPLidar A3: 256000
  # Для generic/MOP3: обычно 115200

  # ROS2 параметры
  frame_id: "lidar_frame"
  angle_min: -3.14159  # Минимальный угол (радианы)
  angle_max: 3.14159   # Максимальный угол (радианы)
  range_min: 0.05      # Минимальная дальность (метры)
  range_max: 16.0      # Максимальная дальность (метры) - для RPLidar A2: до 16м
  scan_rate: 10.0      # Частота публикации сканов (Гц), A2 поддерживает 5-15 Гц
