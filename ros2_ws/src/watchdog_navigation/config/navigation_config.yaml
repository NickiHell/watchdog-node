# Конфигурация навигации

navigation:
  # Безопасность
  safety_distance: 0.3  # Минимальное расстояние до препятствия (метры)
  inflation_radius: 0.3  # Радиус раздувания препятствий для планирования пути

  # Скорости
  max_linear_velocity: 0.5  # Максимальная линейная скорость (м/с)
  max_angular_velocity: 1.0  # Максимальная угловая скорость (рад/с)

  # Точность
  goal_tolerance: 0.1  # Точность достижения цели (метры)

  # SLAM
  use_slam: true  # Использовать SLAM для построения карты
  # Примечание: требуется запущенный slam_toolbox узел для работы SLAM
