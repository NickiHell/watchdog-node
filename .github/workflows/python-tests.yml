name: Python Tests

# Отключено для экономии минут GitHub Actions (приватный репозиторий)
# Для запуска тестов используйте локально: pytest ros2_ws/src/ -v

on:
  workflow_dispatch:  # Только ручной запуск, если нужно

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    if: false  # Отключено по умолчанию для приватных репо
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
      
      - name: Run tests
        run: |
          pytest ros2_ws/src/ -v --cov=ros2_ws/src --cov-report=term-missing

