version: '3.8'

services:
  watchdog:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: watchdog_robot
    network_mode: host
    privileged: true  # Для доступа к USB устройствам
    volumes:
      - ./config:/workspace/config:ro
      - ./logs:/workspace/logs
      - /dev:/dev  # Доступ к устройствам
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0  # Лидар
      - /dev/ttyACM0:/dev/ttyACM0  # STM32
      - /dev/video0:/dev/video0     # Камера
    restart: unless-stopped

  # Опционально: отдельный сервис для разработки
  watchdog-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: watchdog_dev
    network_mode: host
    privileged: true
    volumes:
      - .:/workspace
      - /dev:/dev
    environment:
      - ROS_DOMAIN_ID=0
    command: /bin/bash
    stdin_open: true
    tty: true

